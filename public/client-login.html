<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Login | BIC Canada Refund Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="client-login">
  <header class="header">
    <div class="site-brand">
      <img src="images/bic-logo.jpeg" alt="BIC Canada Logo" class="brand-logo" />
      <div class="brand-copy">
        <div class="title">Client Access</div>
        <div class="subtitle">Secure login for case verification</div>
      </div>
    </div>
    <button id="nav-toggle" class="nav-toggle" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="header-nav">
      <a href="/">Home</a>
      <a href="/client-signup.html">Signup</a>
    </nav>
  </header>

  <main class="container">
    <section class="form-card" style="max-width:540px; margin:1rem auto;">
      <div class="section-header">
        <h2>Secure Client Sign In</h2>
      </div>
      <div id="message-area"></div>
      <form id="client-login-form">
        <div class="form-field">
          <label for="client-email">Verified Email</label>
          <input id="client-email" type="email" placeholder="client@example.com" required />
        </div>
        <div class="form-field">
          <label for="client-password">Password</label>
          <input id="client-password" type="password" placeholder="Enter password" required />
        </div>
        <button class="button-primary" type="submit" onclick="handleClientLogin()">Sign In</button>
      </form>
      <div style="margin-top:1rem; display:flex; justify-content:space-between; gap:1rem; flex-wrap:wrap;">
        <a href="/client-forgot.html">Forgot password?</a>
        <a href="/client-signup.html">New client signup</a>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
