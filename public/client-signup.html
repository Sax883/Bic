<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Signup | BIC Canada Refund Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="client-signup">
  <header class="header">
    <div class="site-brand">
      <img src="images/bic-logo.jpeg" alt="BIC Canada Logo" class="brand-logo" />
      <div class="brand-copy">
        <div class="title">Create Client Account</div>
        <div class="subtitle">Start your refund case enrollment</div>
      </div>
    </div>
    <button id="nav-toggle" class="nav-toggle" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="header-nav">
      <a href="/">Home</a>
      <a href="/client-login.html">Login</a>
    </nav>
  </header>

  <main class="container">
    <section class="form-card" style="max-width:620px; margin:1rem auto;">
      <div class="section-header">
        <h2>Client Registration</h2>
      </div>
      <div id="message-area"></div>
      <form id="client-signup-form">
        <div class="form-field">
          <label for="signup-name">Full Name</label>
          <input id="signup-name" type="text" placeholder="John Doe" required />
        </div>
        <div class="form-field">
          <label for="signup-email">Email Address</label>
          <input id="signup-email" type="email" placeholder="john.doe@example.com" required />
        </div>
        <div class="form-field">
          <label for="signup-password">Password</label>
          <input id="signup-password" type="password" placeholder="Secure password" required />
        </div>
        <div class="form-field">
          <label for="signup-track">Enrollment Type</label>
          <select id="signup-track" required>
            <option value="">Select your track</option>
            <option>Express Entry</option>
            <option>Study Permit</option>
            <option>Work Visa</option>
            <option>Visitor Record</option>
          </select>
        </div>
        <div class="form-field">
          <label for="signup-refund-amount">Refund Amount Filed</label>
          <input id="signup-refund-amount" type="number" min="0" step="0.01" placeholder="Enter refund amount you are filing for" required />
        </div>
        <button class="button-primary" type="submit">Register Account</button>
      </form>
      <p style="margin-top:1rem; color: var(--muted);">After registration, use the login page to access your dashboard and review your case details.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
